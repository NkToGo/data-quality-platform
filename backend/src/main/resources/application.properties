spring.application.name=data-quality-backend

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:data_quality}
spring.datasource.username=${POSTGRES_USER:data_quality}
spring.datasource.password=${POSTGRES_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
